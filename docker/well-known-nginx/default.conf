server {
    listen 80 default_server;
    listen 8448;
    server_name sayance.local _;
    
    # Serve well-known files with proper CORS headers
    location /.well-known/matrix/server {
        root /usr/share/nginx/html;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Content-Type "application/json" always;
        try_files $uri =404;
    }
    
    location /.well-known/ {
        root /usr/share/nginx/html;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Content-Type "application/json" always;
        try_files $uri =404;
    }
    
    # Proxy Matrix federation requests to Synapse
    location /_matrix/federation/ {
        proxy_pass http://172.18.0.4:8448;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Proxy Matrix client API as well (in case needed)
    location /_matrix/client/ {
        proxy_pass http://172.18.0.4:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Default response for other requests
    location / {
        return 404;
    }
} 
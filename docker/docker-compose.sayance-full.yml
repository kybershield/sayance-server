version: '3.8'

networks:
  sayance:
    driver: bridge

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14
    restart: always
    environment:
      POSTGRES_USER: sayance_user
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - sayance
    command: >
      postgres
      -c 'max_connections=100'
      -c 'shared_buffers=256MB'
      -c 'log_statement=all'
      -c 'client_min_messages=notice'
      -c 'lc_messages=C'
      -c 'lc_monetary=C'
      -c 'lc_numeric=C'
      -c 'lc_time=C'
      -c 'default_text_search_config=pg_catalog.english'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sayance_user -d sayance"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for LiveKit
  redis:
    image: redis:6-alpine
    command: redis-server /etc/redis.conf
    volumes:
      - ./element-call-backend/redis.conf:/etc/redis.conf:Z
    networks:
      - sayance
    restart: unless-stopped

  # Synapse Matrix Homeserver
  synapse:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: always
    volumes:
      - synapse-data:/data
      - ../homeserver.yaml:/data/homeserver.yaml:ro
      - ../config:/data/config
      - ../config:/config
      - synapse-keys:/data/keys
      - ../secrets:/data/secrets:ro
    environment:
      - SYNAPSE_CONFIG_PATH=/data/homeserver.yaml
    working_dir: /data
    entrypoint: /bin/sh
    command: -c "mkdir -p /data/keys && ln -sf /data/keys/sayance.signing.key /data/sayance.signing.key && python -m synapse.app.homeserver --config-path /data/homeserver.yaml"
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost:8008/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      - postgres
    networks:
      - sayance

  # LiveKit JWT Authentication Service
  auth-service:
    image: ghcr.io/element-hq/lk-jwt-service:latest-ci
    hostname: auth-service
    environment:
      - LIVEKIT_JWT_PORT=6080
      - LIVEKIT_URL=wss://rtc.sayance.localhost/livekit/sfu
      - LIVEKIT_KEY=devkey
      - LIVEKIT_SECRET=secret
      - LIVEKIT_INSECURE_SKIP_VERIFY_TLS=YES_I_KNOW_WHAT_I_AM_DOING
    deploy:
      restart_policy:
        condition: on-failure
    networks:
      - sayance
    depends_on:
      - synapse

  # LiveKit SFU Server
  livekit:
    image: livekit/livekit-server:latest
    hostname: livekit
    command: --dev --config /etc/livekit.yaml
    restart: unless-stopped
    ports:
      - 7880:7880/tcp
      - 7881:7881/tcp
      - 7882:7882/tcp
      - 50100-50200:50100-50200/udp
    volumes:
      - ./element-call-backend/livekit.yaml:/etc/livekit.yaml:Z
    networks:
      - sayance
    depends_on:
      - redis

  # Sayance Web Application
  sayance-web:
    build:
      context: ../../sayance-web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - VITE_DEFAULT_HOMESERVER_URL=https://sayance.localhost
      - VITE_ALLOW_REGISTRATION=true
    networks:
      - sayance
    depends_on:
      - synapse

  # Sayance Call (Element Call) Application
  sayance-call:
    build:
      context: ../../sayance-call
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - sayance
    depends_on:
      - synapse
      - auth-service
      - livekit

  # Nginx Reverse Proxy with SSL
  nginx:
    image: nginx:latest
    hostname: sayance.localhost
    volumes:
      - ./element-call-backend/nginx.conf:/etc/nginx/conf.d/default.conf:Z
      - ./element-call-backend/ssl:/root/ssl:Z
    ports:
      - "443:443"
      - "8008:80"
      - "8448:8448"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - synapse
      - auth-service
      - livekit
      - sayance-web
      - sayance-call
    networks:
      - sayance
    restart: unless-stopped

volumes:
  synapse-data:
  synapse-keys:
  postgres-data: 